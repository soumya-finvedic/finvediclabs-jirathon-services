# Server
server.port=8083

  # Spring Application
spring.application.name=user-service

  # MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/jirathon_users}
spring.data.mongodb.auto-index-creation=true

  # Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

  # JWT
jwt.secret=${JWT_SECRET:dGhpc0lzQVNlY3VyZUtleUZvckRldmVsb3BtZW50T25seURvTm90VXNlSW5Qcm9k}
jwt.issuer=jirathon-auth

  # Management / Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

  # Logging
logging.level.com.jirathon=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{tenantId:-}] %-5level %logger{36} - %msg%n