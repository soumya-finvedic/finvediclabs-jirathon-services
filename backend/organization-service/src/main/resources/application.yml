server:
  port: 8084

spring:
  application:
    name: organization-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/jirathon_org}
      auto-index-creation: true

jwt:
  secret: ${JWT_SECRET:jirathon-super-secret-key-that-is-at-least-256-bits-long-for-hs256}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.jirathon.org: DEBUG
    org.springframework.security: INFO
    org.springframework.data.mongodb: INFO
