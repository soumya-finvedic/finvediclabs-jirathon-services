server.port=8088

spring.application.name=payment-service
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/jirathon_payments}
spring.data.mongodb.auto-index-creation=true

payu.key=${PAYU_KEY:jF4hib}
payu.salt=${PAYU_SALT:YoGW3FdALLRxO0Hz325SkJlFvsFwqQa6}
payu.base-url=${PAYU_BASE_URL:https://test.payu.in}
payu.success-url=${PAYU_SUCCESS_URL:http://localhost:8088/payment/success}
payu.failure-url=${PAYU_FAILURE_URL:http://localhost:8088/payment/failure}
