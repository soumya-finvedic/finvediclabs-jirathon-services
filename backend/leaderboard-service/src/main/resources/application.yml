server:
  port: 8087

spring:
  application:
    name: leaderboard-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:leaderboard-service}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

leaderboard:
  kafka-topic: ${LEADERBOARD_KAFKA_TOPIC:leaderboard-score-events}
  websocket-top-global: /topic/leaderboards/global
  websocket-top-org-prefix: /topic/leaderboards/org.

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.jirathon.leaderboard: INFO
    org.springframework.web.socket: WARN
    org.springframework.kafka: INFO
