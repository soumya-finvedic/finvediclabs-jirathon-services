# Server
server.port=8081
server.servlet.context-path=/

  # Spring Application
spring.application.name=auth-service

  # MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/jirathon_auth?replicaSet=rs0&serverSelectionTimeoutMS=5000&connectTimeoutMS=3000&socketTimeoutMS=5000}
spring.data.mongodb.auto-index-creation=true

  # Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

  # Mail (SMTP)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=saisowmya1597@gmail.com
spring.mail.password=zgbsygbblkmcpluh
spring.mail.from-address=saisowmya1597@gmail.com
spring.mail.from-name=Jirathon
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

  # JWT
jwt.secret=${JWT_SECRET:dGhpc0lzQVNlY3VyZUtleUZvckRldmVsb3BtZW50T25seURvTm90VXNlSW5Qcm9k}
jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRY:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRY:604800000}
jwt.issuer=jirathon-auth

  # OAuth
oauth.google.client-id=${GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${GOOGLE_CLIENT_SECRET:}
oauth.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/callback/google}

oauth.azure.client-id=${AZURE_CLIENT_ID:}
oauth.azure.client-secret=${AZURE_CLIENT_SECRET:}
oauth.azure.redirect-uri=${AZURE_REDIRECT_URI:http://localhost:5173/auth/callback/azure}
oauth.azure.tenant-id=${AZURE_TENANT_ID:common}

  # App
app.frontend-base-url=${FRONTEND_URL:http://localhost:5173}

  # Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

  # Logging
logging.level.com.jirathon=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{tenantId:-}] [%X{traceId:-}] %-5level %logger{36} - %msg%n