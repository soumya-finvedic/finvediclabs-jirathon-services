x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: jirathon-reverse-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - auth-service
      - user-service
      - organization-service
      - contest-service
      - execution-service
      - leaderboard-service
      - payment-service
      - notification-service
      - ai-evaluation-service
    networks:
      - jirathon-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jirathon-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - jirathon-net
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: jirathon-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USER:-jirathon}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/jirathon_auth?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=${MAIL_HOST:-smtp.mailtrap.io}
      - SMTP_PORT=${MAIL_PORT:-587}
      - SMTP_USERNAME=${MAIL_USERNAME:-}
      - SMTP_PASSWORD=${MAIL_PASSWORD:-}
      - SMTP_FROM=${MAIL_FROM:-noreply@jirathon.io}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - jirathon-net
    logging: *default-logging

  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: jirathon-user
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USER:-jirathon}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/jirathon_user?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - jirathon-net
    logging: *default-logging

  organization-service:
    build:
      context: ./backend/organization-service
      dockerfile: Dockerfile
    container_name: jirathon-organization
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USER:-jirathon}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/jirathon_organization?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - mongodb
      - kafka
    networks:
      - jirathon-net
    logging: *default-logging

  contest-service:
    build:
      context: ./backend/contest-service
      dockerfile: Dockerfile
    container_name: jirathon-contest
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USER:-jirathon}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/jirathon_contest?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - mongodb
      - kafka
      - redis
    networks:
      - jirathon-net
    logging: *default-logging

  execution-service:
    build:
      context: ./backend/execution-service
      dockerfile: Dockerfile
    container_name: jirathon-execution
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USER:-jirathon}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/jirathon_execution?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - mongodb
      - kafka
    networks:
      - jirathon-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging: *default-logging

  leaderboard-service:
    build:
      context: ./backend/leaderboard-service
      dockerfile: Dockerfile
    container_name: jirathon-leaderboard
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - redis
      - kafka
    networks:
      - jirathon-net
    logging: *default-logging

  payment-service:
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile
    container_name: jirathon-payment
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USER:-jirathon}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/jirathon_payment?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - mongodb
      - kafka
    networks:
      - jirathon-net
    logging: *default-logging

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: jirathon-notification
    restart: unless-stopped
    ports:
      - "8091:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USER:-jirathon}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/notification_db?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APP_MAIL_HOST=${MAIL_HOST:-smtp.mailtrap.io}
      - APP_MAIL_PORT=${MAIL_PORT:-587}
      - APP_MAIL_USERNAME=${MAIL_USERNAME:-}
      - APP_MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MANAGEMENT_HEALTH_MAIL_ENABLED=false
    depends_on:
      - mongodb
      - kafka
    networks:
      - jirathon-net
    logging: *default-logging

  ai-evaluation-service:
    build:
      context: ./backend/ai-evaluation-service
      dockerfile: Dockerfile
    container_name: jirathon-ai-evaluation
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - AIEVAL_MONGO_URI=mongodb://${MONGO_ROOT_USER:-jirathon}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb:27017/?authSource=admin
      - AIEVAL_MONGO_DB=jirathon_ai_evaluation
      - AIEVAL_OPENAI_API_KEY=${AIEVAL_OPENAI_API_KEY:-}
      - AIEVAL_ADMIN_TOKEN=${AIEVAL_ADMIN_TOKEN:?AIEVAL_ADMIN_TOKEN is required}
    depends_on:
      - mongodb
    networks:
      - jirathon-net
    logging: *default-logging

  mongodb:
    image: mongo:7
    container_name: jirathon-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-jirathon}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
      - ./deployment/mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - jirathon-net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: jirathon-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - jirathon-net
    logging: *default-logging

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: jirathon-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - jirathon-net
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: jirathon-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - jirathon-net
    logging: *default-logging

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: jirathon-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    profiles:
      - ops
    ports:
      - "127.0.0.1:8089:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=jirathon
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - DYNAMIC_CONFIG_ENABLED=true
    networks:
      - jirathon-net
    logging: *default-logging

networks:
  jirathon-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
