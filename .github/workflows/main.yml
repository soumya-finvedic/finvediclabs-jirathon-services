name: Jirathon CI/CD

on:
  push:
    branches:
      - develop
      - staging
      - main
  pull_request:
    branches:
      - develop
      - staging
      - main
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - prod

# Prevent parallel deploys to same ref
concurrency:
  group: jirathon-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Build, Test, Dockerize
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.meta.outputs.deploy_env }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_tag_short: ${{ steps.meta.outputs.image_tag_short }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute pipeline metadata
        id: meta
        shell: bash
        run: |
          # Resolve deploy target by branch or manual input
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DEPLOY_ENV="${{ github.event.inputs.deploy_env }}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            DEPLOY_ENV="prod"
          elif [[ "${GITHUB_REF_NAME}" == "staging" ]]; then
            DEPLOY_ENV="staging"
          else
            DEPLOY_ENV="dev"
          fi

          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_TAG_SHORT="${GITHUB_SHA::8}"

          echo "deploy_env=${DEPLOY_ENV}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag_short=${IMAGE_TAG_SHORT}" >> "$GITHUB_OUTPUT"

      # ------------------------
      # Build & Test prerequisites
      # ------------------------
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/ai-evaluation-service/requirements.txt

      # ------------------------
      # Test Stage
      # ------------------------
      - name: Test Stage - Spring Boot unit tests (JUnit)
        shell: bash
        run: |
          set -euo pipefail
          services=(
            backend/auth-service
            backend/user-service
            backend/organization-service
            backend/contest-service
            backend/execution-service
            backend/leaderboard-service
            backend/payment-service
            backend/notification-service
          )

          for svc in "${services[@]}"; do
            echo "[test] Running JUnit tests for ${svc}"
            (cd "$svc" && mvn -B -ntp test)
          done

      - name: Test Stage - Frontend tests
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          # Frontend quality gate (acts as test gate until a dedicated test suite is added)
          npm run lint

      - name: Test Stage - FastAPI smoke tests
        shell: bash
        run: |
          set -euo pipefail
          cd backend/ai-evaluation-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Syntax/import smoke verification
          python -m compileall app

      # ------------------------
      # Build Stage
      # ------------------------
      - name: Build Stage - Package Spring Boot services
        shell: bash
        run: |
          set -euo pipefail
          services=(
            backend/auth-service
            backend/user-service
            backend/organization-service
            backend/contest-service
            backend/execution-service
            backend/leaderboard-service
            backend/payment-service
            backend/notification-service
          )

          for svc in "${services[@]}"; do
            echo "[build] Packaging ${svc}"
            (cd "$svc" && mvn -B -ntp -DskipTests clean package)
          done

      - name: Build Stage - Build Vue frontend
        shell: bash
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run build

      - name: Build Stage - FastAPI packaging smoke
        shell: bash
        run: |
          set -euo pipefail
          cd backend/ai-evaluation-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import app.main; print('fastapi-build-ok')"

      # ------------------------
      # Docker Stage
      # ------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Stage - Build images (latest + commit hash)
        shell: bash
        env:
          REGISTRY: ${{ vars.REGISTRY || 'docker.io' }}
          IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE || github.repository_owner }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag_short }}
        run: |
          chmod +x deployment/scripts/ci-build-images.sh
          deployment/scripts/ci-build-images.sh

      # ------------------------
      # Push Stage
      # ------------------------
      - name: Login to Docker registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY || 'docker.io' }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Push Stage - Push images
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          REGISTRY: ${{ vars.REGISTRY || 'docker.io' }}
          IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE || github.repository_owner }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag_short }}
        run: |
          chmod +x deployment/scripts/ci-push-images.sh
          deployment/scripts/ci-push-images.sh

  deploy:
    name: Deploy to Plesk
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'
    environment: ${{ needs.ci.outputs.deploy_env }}

    steps:
      - name: Deploy Stage - SSH into Plesk and run deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_ENV: ${{ needs.ci.outputs.deploy_env }}
          IMAGE_TAG: ${{ needs.ci.outputs.image_tag_short }}
          REGISTRY: ${{ vars.REGISTRY || 'docker.io' }}
          IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE || github.repository_owner }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_ROOT_USER: ${{ vars.MONGO_ROOT_USER || 'jirathon' }}
          AIEVAL_ADMIN_TOKEN: ${{ secrets.AIEVAL_ADMIN_TOKEN }}
          AIEVAL_OPENAI_API_KEY: ${{ secrets.AIEVAL_OPENAI_API_KEY }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT || '587' }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          REGISTRY_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        with:
          host: ${{ secrets.PLESK_SSH_HOST }}
          username: ${{ secrets.PLESK_SSH_USER }}
          key: ${{ secrets.PLESK_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PLESK_SSH_PORT || 22 }}
          envs: DEPLOY_ENV,IMAGE_TAG,REGISTRY,IMAGE_NAMESPACE,MONGO_ROOT_PASSWORD,MONGO_ROOT_USER,AIEVAL_ADMIN_TOKEN,AIEVAL_OPENAI_API_KEY,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,REGISTRY_USERNAME,REGISTRY_PASSWORD
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ vars.PLESK_APP_PATH }}"

            # Pull latest repository state before deployment
            git fetch --all
            git reset --hard "origin/${{ github.ref_name }}"

            chmod +x deployment/scripts/deploy.sh
            chmod +x deployment/scripts/db-init.sh

            # Rolling deployment with compose (zero/minimal downtime strategy)
            deployment/scripts/deploy.sh
